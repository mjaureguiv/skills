  </text>
  <text x="310" y="537"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10.5" fill="#444444">
    POST /publish  ·  Collaboration Hub
  </text>

  <!-- Arrow 4 -->
  <line x1="310" y1="545" x2="310" y2="582"
        stroke="#666666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════════════════════════════════
       GOVERNANCE BOX  (dashed — cross-tier overlay)
  ════════════════════════════════════════════════ -->
  <rect x="60" y="584" width="500" height="116" rx="6" ry="6"
        fill="#f7f7f7" stroke="#666666" stroke-width="1.5" stroke-dasharray="7,3"/>
  <text x="310" y="607"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12.5" font-weight="bold" fill="#111111" letter-spacing="1">
