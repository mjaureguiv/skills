<svg xmlns="http://www.w3.org/2000/svg" width="620" height="730" viewBox="0 0 620 730">

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="620" height="730" fill="#ffffff"/>

  <!-- ═══════════════════════════════════════════════
       USER BOX
  ════════════════════════════════════════════════ -->
  <rect x="60" y="24" width="500" height="66" rx="6" ry="6"
        fill="#f0f0f0" stroke="#333333" stroke-width="1.5"/>
  <text x="310" y="47"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12.5" font-weight="bold" fill="#111111">
    USER (Process Manager)
  </text>
  <text x="310" y="67"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10.5" fill="#555555">
    provides: model URL  ·  target language  ·  intent
  </text>

  <!-- Arrow 1 -->
  <line x1="310" y1="90" x2="310" y2="130"
        stroke="#666666" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ═══════════════════════════════════════════════
       PERCEPTION BOX
  ════════════════════════════════════════════════ -->
  <rect x="60" y="132" width="500" height="80" rx="6" ry="6"
        fill="#ffffff" stroke="#444444" stroke-width="1.5"/>
  <text x="310" y="154"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12.5" font-weight="bold" fill="#111111" letter-spacing="1">
    PERCEPTION
  </text>
  <line x1="85" y1="161" x2="535" y2="161" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="310" y="178"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10.5" fill="#444444">
    GET /model/{id}/json
  </text>
  <text x="310" y="198"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10.5" fill="#444444">
    Parse:  pools  ·  lanes  ·  tasks  ·  gateways  ·  events  ·  flows
  </text>

  <!-- Arrow 2 with label -->
  <line x1="310" y1="212" x2="310" y2="262"
