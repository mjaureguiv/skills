  </text>
  <line x1="85" y1="629" x2="535" y2="629" stroke="#d8d8d8" stroke-width="0.8"/>
  <text x="310" y="648"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10.5" fill="#444444">
