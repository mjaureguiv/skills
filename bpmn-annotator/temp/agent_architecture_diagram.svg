  <text x="310" y="472"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="12.5" font-weight="bold" fill="#111111" letter-spacing="1">
    ACTION
  </text>
  <line x1="85" y1="479" x2="535" y2="479" stroke="#e0e0e0" stroke-width="0.8"/>
  <text x="310" y="498"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="10.5" fill="#444444">
