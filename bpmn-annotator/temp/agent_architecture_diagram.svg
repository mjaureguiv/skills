  <text x="318" y="241"
        text-anchor="start"
        font-family="Arial, Helvetica, sans-serif"
        font-size="9" font-style="italic" fill="#888888">
    structured process model representation
  </text>

  <!-- ═══════════════════════════════════════════════
       REASONING BOX
  ════════════════════════════════════════════════ -->
  <rect x="60" y="264" width="500" height="136" rx="6" ry="6"
